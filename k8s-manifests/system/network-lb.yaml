apiVersion: v1
kind: Service
metadata:
  name: app-network-lb
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
    service.beta.kubernetes.io/oci-load-balancer-internal: "false"
spec:
  type: LoadBalancer
  selector:
    app: my-app # This must match the labels in your deployment
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080 # The port your app listens on for HTTP
    - name: https
      protocol: TCP
      port: 443
      targetPort: 8443 # The port your app listens on for HTTPS/TLS
